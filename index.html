<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyHub — Learn Smarter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#0b0c10; --bg2:#13141a; --bg3:#1c1d26; --bg4:#232431;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.13);
  --text:#f0efe8; --text2:#9a9891; --text3:#5a5955;
  --gold:#e8b86d; --gold2:#f5d49a; --gold-dim:rgba(232,184,109,0.12);
  --green:#4caf82; --green-dim:rgba(76,175,130,0.12);
  --red:#e05c5c; --red-dim:rgba(224,92,92,0.12);
  --blue:#5b9cf6; --blue-dim:rgba(91,156,246,0.1);
  --purple:#a78bfa; --purple-dim:rgba(167,139,250,0.1);
  --teal:#2dd4bf; --teal-dim:rgba(45,212,191,0.1);
  --radius:14px; --radius-sm:8px; --shadow:0 8px 40px rgba(0,0,0,0.4);
}
html { scroll-behavior:smooth; }
body { font-family:'Plus Jakarta Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; line-height:1.6; overflow-x:hidden; }
body::before { content:''; position:fixed; inset:0; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events:none; z-index:9999; opacity:0.4; }
#root { min-height:100vh; }
::-webkit-scrollbar { width:4px; } ::-webkit-scrollbar-track { background:transparent; } ::-webkit-scrollbar-thumb { background:var(--border2); border-radius:4px; }

@keyframes fadeUp   { from{opacity:0;transform:translateY(20px);} to{opacity:1;transform:none;} }
@keyframes fadeIn   { from{opacity:0;} to{opacity:1;} }
@keyframes popIn    { 0%{transform:scale(0.85);opacity:0;} 70%{transform:scale(1.03);} 100%{transform:scale(1);opacity:1;} }
@keyframes spin     { to{transform:rotate(360deg);} }
@keyframes pulse    { 0%,100%{opacity:1;} 50%{opacity:0.45;} }
@keyframes shimmer  { 0%{background-position:-200% 0;} 100%{background-position:200% 0;} }
@keyframes glow     { 0%,100%{box-shadow:0 0 20px rgba(232,184,109,0.2);} 50%{box-shadow:0 0 40px rgba(232,184,109,0.5);} }
@keyframes typeIn   { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:none;} }
@keyframes blink    { 0%,100%{opacity:1;} 50%{opacity:0;} }
@keyframes slideIn  { from{opacity:0;transform:translateX(-10px);} to{opacity:1;transform:none;} }

.animate-fadeup { animation:fadeUp 0.5s ease both; }
.animate-fadein { animation:fadeIn 0.4s ease both; }
.animate-popin  { animation:popIn 0.35s cubic-bezier(0.34,1.56,0.64,1) both; }
.animate-slidein{ animation:slideIn 0.35s ease both; }

.app-shell { max-width:1100px; margin:0 auto; padding:0 20px; min-height:100vh; display:flex; flex-direction:column; }

/* NAV */
.nav { display:flex; align-items:center; justify-content:space-between; padding:18px 0; border-bottom:1px solid var(--border); flex-wrap:wrap; gap:10px; }
.nav-logo { font-family:'Playfair Display',serif; font-size:22px; font-weight:700; display:flex; align-items:center; gap:8px; }
.nav-logo-dot { width:8px; height:8px; background:var(--gold); border-radius:50%; box-shadow:0 0 10px var(--gold); }
.nav-right { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.nav-btn { padding:7px 14px; border-radius:999px; border:1px solid var(--border2); background:transparent; color:var(--text2); font-family:inherit; font-size:13px; cursor:pointer; transition:all 0.2s; white-space:nowrap; }
.nav-btn:hover { background:var(--bg3); color:var(--text); }
.nav-btn.active { background:var(--gold-dim); color:var(--gold); border-color:rgba(232,184,109,0.3); }
.nav-btn.ask-btn { background:linear-gradient(135deg,var(--teal-dim),var(--blue-dim)); color:var(--teal); border-color:rgba(45,212,191,0.3); }
.nav-btn.ask-btn:hover { background:linear-gradient(135deg,rgba(45,212,191,0.2),rgba(91,156,246,0.15)); }
.nav-btn.ask-btn.active { background:rgba(45,212,191,0.18); border-color:var(--teal); }
.streak-pill { display:flex; align-items:center; gap:6px; padding:6px 12px; background:var(--bg2); border:1px solid var(--border); border-radius:999px; font-size:13px; }

/* BUTTONS */
.btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; padding:12px 24px; border-radius:var(--radius-sm); border:none; font-family:'Plus Jakarta Sans',sans-serif; font-size:14px; font-weight:500; cursor:pointer; transition:all 0.2s; }
.btn-primary { background:var(--gold); color:#1a1408; font-weight:600; }
.btn-primary:hover { background:var(--gold2); transform:translateY(-1px); box-shadow:0 4px 20px rgba(232,184,109,0.3); }
.btn-secondary { background:var(--bg3); color:var(--text2); border:1px solid var(--border2); }
.btn-secondary:hover { background:var(--bg4); color:var(--text); }
.btn-ghost { background:transparent; color:var(--text2); border:1px solid var(--border); }
.btn-ghost:hover { border-color:var(--border2); color:var(--text); }
.btn-teal { background:rgba(45,212,191,0.15); color:var(--teal); border:1px solid rgba(45,212,191,0.3); }
.btn-teal:hover { background:rgba(45,212,191,0.25); transform:translateY(-1px); }
.btn:disabled { opacity:0.4; cursor:not-allowed; transform:none !important; }
.btn-sm { padding:8px 16px; font-size:13px; }
.btn-lg { padding:15px 32px; font-size:16px; }

/* BADGES */
.badge { display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border-radius:999px; font-size:11px; font-weight:500; letter-spacing:0.04em; text-transform:uppercase; }
.badge-gold   { background:var(--gold-dim);   color:var(--gold);   border:1px solid rgba(232,184,109,0.2); }
.badge-green  { background:var(--green-dim);  color:var(--green);  border:1px solid rgba(76,175,130,0.2); }
.badge-red    { background:var(--red-dim);    color:var(--red);    border:1px solid rgba(224,92,92,0.2); }
.badge-blue   { background:var(--blue-dim);   color:var(--blue);   border:1px solid rgba(91,156,246,0.2); }
.badge-purple { background:var(--purple-dim); color:var(--purple); border:1px solid rgba(167,139,250,0.2); }
.badge-teal   { background:var(--teal-dim);   color:var(--teal);   border:1px solid rgba(45,212,191,0.2); }

/* PROGRESS */
.progress-track { height:4px; background:var(--bg4); border-radius:99px; overflow:hidden; }
.progress-fill { height:100%; background:linear-gradient(90deg,var(--gold),var(--gold2)); border-radius:99px; transition:width 0.5s cubic-bezier(0.4,0,0.2,1); }
.spinner { width:20px; height:20px; border:2px solid var(--border2); border-top-color:var(--gold); border-radius:50%; animation:spin 0.8s linear infinite; display:inline-block; flex-shrink:0; }

/* ── DASHBOARD ── */
.dashboard { padding:40px 0 60px; }
.dashboard-hero { display:grid; grid-template-columns:1fr 1fr; gap:32px; align-items:center; margin-bottom:48px; }
.hero-eyebrow { font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:var(--gold); margin-bottom:12px; font-weight:500; }
.hero-title { font-family:'Playfair Display',serif; font-size:clamp(30px,4vw,50px); line-height:1.15; font-weight:700; margin-bottom:16px; letter-spacing:-0.02em; }
.hero-title em { font-style:italic; color:var(--gold); }
.hero-subtitle { font-size:15px; color:var(--text2); line-height:1.7; margin-bottom:28px; max-width:420px; }
.hero-ctas { display:flex; gap:12px; flex-wrap:wrap; }
.hero-stats { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.stat-card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:20px; transition:border-color 0.2s,transform 0.2s; }
.stat-card:hover { border-color:var(--border2); transform:translateY(-2px); }
.stat-icon { font-size:20px; margin-bottom:10px; }
.stat-value { font-family:'Playfair Display',serif; font-size:32px; font-weight:700; line-height:1; margin-bottom:4px; }
.stat-label { font-size:12px; color:var(--text3); }
.section-header { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:20px; }
.section-title { font-family:'Playfair Display',serif; font-size:22px; font-weight:700; }
.section-sub { font-size:13px; color:var(--text3); }
.subject-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:16px; margin-bottom:40px; }
.subject-card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:22px; cursor:pointer; transition:all 0.2s; position:relative; overflow:hidden; }
.subject-card::before { content:''; position:absolute; top:0; left:0; width:3px; height:100%; background:var(--accent-color,var(--gold)); }
.subject-card:hover { border-color:var(--border2); transform:translateY(-3px); box-shadow:0 12px 30px rgba(0,0,0,0.3); }
.subject-icon { font-size:28px; margin-bottom:12px; }
.subject-name { font-size:16px; font-weight:600; margin-bottom:4px; }
.subject-desc { font-size:12px; color:var(--text3); margin-bottom:14px; line-height:1.5; }
.subject-meta { display:flex; align-items:center; justify-content:space-between; }
.subject-count { font-size:11px; color:var(--text3); }

/* Ask Alex promo card on dashboard */
.ask-promo-card { background:linear-gradient(135deg,rgba(45,212,191,0.06),rgba(91,156,246,0.06)); border:1px solid rgba(45,212,191,0.2); border-radius:var(--radius); padding:24px; display:flex; align-items:center; gap:20px; margin-bottom:40px; cursor:pointer; transition:all 0.2s; }
.ask-promo-card:hover { border-color:rgba(45,212,191,0.4); transform:translateY(-2px); }
.ask-promo-orb { width:52px; height:52px; border-radius:50%; background:linear-gradient(135deg,var(--teal),var(--blue)); display:flex; align-items:center; justify-content:center; font-size:24px; flex-shrink:0; }
.ask-promo-title { font-size:16px; font-weight:600; color:var(--text); margin-bottom:4px; }
.ask-promo-sub { font-size:13px; color:var(--text2); line-height:1.5; }

.activity-list { display:flex; flex-direction:column; gap:10px; }
.activity-item { display:flex; align-items:center; gap:14px; padding:14px 18px; background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius-sm); transition:border-color 0.2s; }
.activity-item:hover { border-color:var(--border2); }
.activity-icon { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
.activity-body { flex:1; }
.activity-title { font-size:13px; font-weight:500; margin-bottom:2px; }
.activity-sub { font-size:11px; color:var(--text3); }
.activity-score { font-family:'Playfair Display',serif; font-size:18px; font-weight:700; }

/* ── QUIZ PAGE ── */
.quiz-page { padding:32px 0 60px; max-width:760px; margin:0 auto; width:100%; }
.quiz-topbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; gap:16px; }
.quiz-progress-wrap { flex:1; }
.quiz-progress-label { display:flex; justify-content:space-between; font-size:12px; color:var(--text3); margin-bottom:6px; }
.quiz-score-badge { display:flex; align-items:center; gap:6px; padding:6px 14px; background:var(--bg2); border:1px solid var(--border); border-radius:999px; font-size:13px; font-weight:500; white-space:nowrap; }
.quiz-score-badge .score-num { font-family:'Playfair Display',serif; font-size:16px; font-weight:700; color:var(--gold); }
.question-card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; margin-bottom:16px; animation:fadeUp 0.4s ease both; }
.question-header { padding:24px 26px 20px; border-bottom:1px solid var(--border); }
.question-meta { display:flex; align-items:center; gap:8px; margin-bottom:14px; flex-wrap:wrap; }
.question-number { font-size:12px; color:var(--text3); }
.question-text { font-family:'Playfair Display',serif; font-size:clamp(16px,2.5vw,20px); line-height:1.5; font-weight:400; }
.options-list { padding:20px 26px 24px; display:flex; flex-direction:column; gap:10px; }
.option-btn { display:flex; align-items:flex-start; gap:14px; padding:14px 16px; border-radius:var(--radius-sm); border:1px solid var(--border); background:var(--bg3); cursor:pointer; transition:all 0.18s; text-align:left; font-family:'Plus Jakarta Sans',sans-serif; font-size:14px; color:var(--text2); width:100%; }
.option-btn:hover:not(:disabled) { border-color:var(--gold); background:var(--gold-dim); color:var(--text); }
.option-btn:disabled { cursor:default; }
.option-letter { width:26px; height:26px; border-radius:50%; background:var(--bg4); border:1px solid var(--border2); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:600; flex-shrink:0; transition:all 0.18s; color:var(--text3); }
.option-btn:hover:not(:disabled) .option-letter { background:var(--gold); border-color:var(--gold); color:#1a1408; }
.option-text { flex:1; line-height:1.5; padding-top:3px; }
.option-btn.correct { border-color:var(--green); background:var(--green-dim); color:var(--green); animation:popIn 0.3s ease both; }
.option-btn.correct .option-letter { background:var(--green); border-color:var(--green); color:#fff; }
.option-btn.wrong { border-color:var(--red); background:var(--red-dim); color:var(--red); animation:popIn 0.3s ease both; }
.option-btn.wrong .option-letter { background:var(--red); border-color:var(--red); color:#fff; }
.option-btn.dimmed { opacity:0.35; }
.feedback-panel { border-top:1px solid var(--border); padding:18px 26px 22px; animation:fadeUp 0.3s ease both; }
.feedback-correct { display:flex; align-items:center; gap:12px; padding:12px 16px; background:var(--green-dim); border:1px solid rgba(76,175,130,0.25); border-radius:var(--radius-sm); color:var(--green); font-size:14px; margin-bottom:14px; }
.feedback-wrong { display:flex; align-items:flex-start; gap:12px; padding:12px 16px; background:var(--red-dim); border:1px solid rgba(224,92,92,0.2); border-radius:var(--radius-sm); color:var(--red); font-size:14px; margin-bottom:14px; }
.feedback-wrong-detail { font-size:12px; color:var(--text3); margin-top:4px; line-height:1.5; }
.feedback-actions { display:flex; gap:10px; flex-wrap:wrap; }

/* ── RESULTS PAGE ── */
.results-page { padding:40px 0 80px; }
.results-hero { text-align:center; padding:48px 20px 36px; }
.results-score-ring { width:140px; height:140px; margin:0 auto 24px; position:relative; }
.results-score-ring svg { width:100%; height:100%; transform:rotate(-90deg); }
.ring-bg  { fill:none; stroke:var(--bg4); stroke-width:8; }
.ring-fill { fill:none; stroke:var(--gold); stroke-width:8; stroke-linecap:round; transition:stroke-dashoffset 1.2s cubic-bezier(0.4,0,0.2,1); filter:drop-shadow(0 0 6px rgba(232,184,109,0.4)); }
.results-score-center { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.results-score-big { font-family:'Playfair Display',serif; font-size:36px; font-weight:700; line-height:1; color:var(--gold); }
.results-score-pct { font-size:12px; color:var(--text3); }
.results-title { font-family:'Playfair Display',serif; font-size:clamp(24px,4vw,38px); font-weight:700; margin-bottom:10px; }
.results-subtitle { font-size:15px; color:var(--text2); max-width:460px; margin:0 auto 28px; }
.results-ctas { display:flex; justify-content:center; gap:12px; flex-wrap:wrap; }
.results-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:14px; margin-bottom:36px; }
.results-metric { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:20px; text-align:center; }
.results-metric-val { font-family:'Playfair Display',serif; font-size:34px; font-weight:700; margin-bottom:4px; }
.results-metric-lbl { font-size:12px; color:var(--text3); }
.improvement-section { margin-bottom:40px; }
.chart-wrap { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:24px; }
.bars { display:flex; align-items:flex-end; gap:8px; height:100px; margin-top:16px; }
.bar-col { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; }
.bar { width:100%; border-radius:4px 4px 0 0; background:var(--bg4); min-height:4px; }
.bar.current { background:linear-gradient(180deg,var(--gold2),var(--gold)); }
.bar-label { font-size:10px; color:var(--text3); }
.bar-val { font-size:11px; font-weight:600; }

/* ── AI REPORT GENERATING ── */
.report-generating { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:60px 32px; text-align:center; margin-bottom:32px; position:relative; overflow:hidden; }
.report-generating::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg,transparent 40%,rgba(232,184,109,0.03) 50%,transparent 60%); background-size:200% 100%; animation:shimmer 2s ease infinite; }
.report-gen-orb { width:64px; height:64px; border-radius:50%; background:linear-gradient(135deg,var(--gold),#c4792a); display:flex; align-items:center; justify-content:center; font-size:28px; margin:0 auto 20px; animation:glow 2s ease infinite; }
.report-gen-title { font-family:'Playfair Display',serif; font-size:22px; font-weight:700; margin-bottom:8px; }
.report-gen-sub { font-size:14px; color:var(--text2); margin-bottom:24px; max-width:380px; margin-left:auto; margin-right:auto; }
.report-gen-steps { display:flex; flex-direction:column; gap:10px; max-width:360px; margin:0 auto; }
.report-gen-step { display:flex; align-items:center; gap:10px; padding:10px 14px; background:var(--bg3); border:1px solid var(--border); border-radius:var(--radius-sm); font-size:13px; color:var(--text3); transition:all 0.4s; }
.report-gen-step.done   { color:var(--green); border-color:rgba(76,175,130,0.2);   background:var(--green-dim); }
.report-gen-step.active { color:var(--gold);  border-color:rgba(232,184,109,0.2); background:var(--gold-dim); animation:pulse 1.2s ease infinite; }
.gen-step-icon { font-size:15px; flex-shrink:0; width:22px; text-align:center; }

/* ── TUTOR REPORT COMPONENTS ── */
.tutor-report { animation:fadeUp 0.5s ease both; margin-bottom:40px; }
.report-header { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:28px; margin-bottom:16px; position:relative; overflow:hidden; }
.report-header::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,var(--gold),transparent); }
.report-header-top { display:flex; align-items:flex-start; gap:16px; margin-bottom:16px; flex-wrap:wrap; }
.report-tutor-avatar { width:48px; height:48px; border-radius:50%; background:linear-gradient(135deg,var(--gold),#c4792a); display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0; box-shadow:0 0 20px rgba(232,184,109,0.25); }
.report-tutor-name { font-size:13px; font-weight:600; margin-bottom:2px; }
.report-tutor-role { font-size:11px; color:var(--text3); }
.report-opening { font-family:'Playfair Display',serif; font-size:17px; font-weight:400; font-style:italic; color:var(--text2); line-height:1.65; }
.report-level-row { display:flex; align-items:center; gap:10px; margin-top:16px; flex-wrap:wrap; }

/* Pattern analysis panel */
.pattern-panel { background:var(--bg3); border:1px solid var(--border2); border-radius:var(--radius); padding:20px 22px; margin-bottom:16px; }
.pattern-panel-title { font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:0.08em; color:var(--purple); margin-bottom:14px; display:flex; align-items:center; gap:8px; }
.pattern-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:10px; }
.pattern-item { background:var(--bg4); border-radius:var(--radius-sm); padding:12px 14px; }
.pattern-item-label { font-size:11px; color:var(--text3); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:6px; }
.pattern-item-val { font-size:14px; font-weight:500; color:var(--text); line-height:1.4; }
.weakness-bar-wrap { margin-top:14px; }
.weakness-bar-label { display:flex; justify-content:space-between; font-size:12px; color:var(--text3); margin-bottom:5px; }
.weakness-bar { height:6px; background:var(--bg4); border-radius:99px; overflow:hidden; }
.weakness-bar-fill { height:100%; border-radius:99px; }

/* Topic groups */
.topic-groups { display:flex; flex-direction:column; gap:6px; }
.topic-group { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; transition:border-color 0.2s; }
.topic-group:hover { border-color:var(--border2); }
.topic-group-header { display:flex; align-items:center; gap:14px; padding:20px 22px; cursor:pointer; transition:background 0.15s; }
.topic-group-header:hover { background:var(--bg3); }
.topic-icon-wrap { width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
.topic-group-meta { flex:1; }
.topic-group-name { font-size:15px; font-weight:600; margin-bottom:3px; }
.topic-group-sub { font-size:12px; color:var(--text3); }
.topic-group-right { display:flex; align-items:center; gap:10px; flex-shrink:0; }
.topic-chevron { font-size:12px; color:var(--text3); transition:transform 0.25s; }
.topic-chevron.open { transform:rotate(180deg); }
.topic-group-body { border-top:1px solid var(--border); padding:22px; }

/* Deep explanation blocks */
.explanation-block { margin-bottom:24px; }
.expl-q-text { font-family:'Playfair Display',serif; font-size:15px; color:var(--text); line-height:1.6; margin-bottom:14px; padding:14px 18px; background:var(--bg3); border-radius:var(--radius-sm); border-left:3px solid var(--gold); }
.answer-comparison { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:16px; }
.answer-pill { display:flex; align-items:flex-start; padding:12px 16px; border-radius:var(--radius-sm); }
.answer-pill.wrong   { background:var(--red-dim);   border:1px solid rgba(224,92,92,0.2); }
.answer-pill.correct { background:var(--green-dim); border:1px solid rgba(76,175,130,0.2); }
.answer-pill-label { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.06em; opacity:0.7; margin-bottom:4px; }
.answer-pill.wrong   .answer-pill-label { color:var(--red); }
.answer-pill.correct .answer-pill-label { color:var(--green); }
.answer-pill-val { font-size:14px; font-weight:500; }
.answer-pill.wrong   .answer-pill-val { color:var(--red); }
.answer-pill.correct .answer-pill-val { color:var(--green); }

/* Explanation sections */
.expl-section { background:var(--bg3); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; margin-bottom:12px; }
.expl-section-header { display:flex; align-items:center; gap:10px; padding:12px 16px; border-bottom:1px solid var(--border); background:var(--bg4); }
.tutor-mini-avatar { width:24px; height:24px; border-radius:50%; background:linear-gradient(135deg,var(--gold),#c4792a); display:flex; align-items:center; justify-content:center; font-size:12px; flex-shrink:0; }
.expl-section-title { font-size:12px; font-weight:600; }
.expl-section-body { padding:16px 18px; }

/* Definition box */
.definition-box { background:var(--purple-dim); border:1px solid rgba(167,139,250,0.2); border-radius:var(--radius-sm); padding:14px 16px; margin-bottom:12px; }
.definition-label { font-size:10px; text-transform:uppercase; letter-spacing:0.08em; font-weight:700; color:var(--purple); margin-bottom:6px; }
.definition-term { font-size:14px; font-weight:600; color:var(--text); margin-bottom:4px; }
.definition-text { font-size:13px; color:var(--text2); line-height:1.65; }

/* Why wrong */
.why-wrong-text { font-size:13px; color:var(--text2); line-height:1.7; margin-bottom:10px; }
.common-mistake-box { background:rgba(224,92,92,0.06); border:1px solid rgba(224,92,92,0.15); border-radius:var(--radius-sm); padding:12px 16px; margin-bottom:0; font-size:13px; color:var(--text2); line-height:1.6; }
.common-mistake-label { font-size:10px; text-transform:uppercase; letter-spacing:0.08em; font-weight:700; color:var(--red); margin-bottom:5px; }

/* Steps */
.correction-step { display:flex; gap:12px; margin-bottom:12px; animation:typeIn 0.4s ease both; }
.step-num { width:22px; height:22px; border-radius:50%; background:var(--gold-dim); border:1px solid rgba(232,184,109,0.25); color:var(--gold); font-size:10px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:2px; }
.step-text { font-size:13px; color:var(--text2); line-height:1.7; flex:1; }

/* Example box */
.example-box { background:var(--teal-dim); border:1px solid rgba(45,212,191,0.2); border-radius:var(--radius-sm); padding:14px 16px; margin-top:12px; }
.example-label { font-size:10px; text-transform:uppercase; letter-spacing:0.08em; font-weight:700; color:var(--teal); margin-bottom:6px; }
.example-text { font-size:13px; color:var(--text2); line-height:1.65; }

/* Memory hook */
.concept-box { background:var(--gold-dim); border:1px solid rgba(232,184,109,0.2); border-radius:var(--radius-sm); padding:12px 16px; }
.concept-box-label { font-size:10px; text-transform:uppercase; letter-spacing:0.08em; font-weight:700; color:var(--gold); margin-bottom:5px; }
.concept-box-text { font-size:13px; color:var(--gold2); line-height:1.65; }

/* Exam tip */
.exam-tip-box { padding:12px 16px; background:var(--blue-dim); border:1px solid rgba(91,156,246,0.2); border-radius:var(--radius-sm); font-size:13px; color:var(--blue); }
.exam-tip-label { font-size:10px; text-transform:uppercase; letter-spacing:0.08em; font-weight:700; display:block; margin-bottom:4px; }

/* Practice recs */
.practice-section { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:22px 24px; margin-top:16px; }
.practice-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:10px; margin-top:14px; }
.practice-card { background:var(--bg3); border:1px solid var(--border2); border-radius:var(--radius-sm); padding:14px 16px; transition:all 0.15s; }
.practice-card:hover { border-color:var(--gold); background:var(--gold-dim); }
.practice-card-topic { font-size:13px; font-weight:600; margin-bottom:4px; }
.practice-card-why { font-size:12px; color:var(--text3); line-height:1.5; margin-bottom:8px; }
.practice-sample { padding:8px 10px; background:var(--bg4); border-radius:6px; font-size:11px; color:var(--text3); line-height:1.5; font-style:italic; margin-bottom:10px; }

/* Study plan */
.study-plan { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:22px 24px; margin-top:16px; }
.study-plan-steps { display:flex; flex-direction:column; gap:10px; margin-top:14px; }
.study-plan-step { display:flex; align-items:flex-start; gap:14px; padding:14px 16px; background:var(--bg3); border:1px solid var(--border); border-radius:var(--radius-sm); }
.study-plan-num { width:28px; height:28px; border-radius:50%; background:var(--gold-dim); border:1px solid rgba(232,184,109,0.3); color:var(--gold); font-size:12px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.study-plan-body { flex:1; }
.study-plan-action { font-size:13px; font-weight:500; color:var(--text); margin-bottom:2px; }
.study-plan-detail { font-size:12px; color:var(--text3); line-height:1.5; }

/* Closing */
.closing-message { background:var(--bg2); border:1px solid var(--border); border-top:2px solid var(--gold); border-radius:var(--radius); padding:26px 28px; display:flex; align-items:flex-start; gap:16px; margin-top:16px; }
.closing-text { font-family:'Playfair Display',serif; font-size:16px; font-style:italic; color:var(--text2); line-height:1.7; }

/* Perfect score */
.perfect-report { background:var(--bg2); border:1px solid rgba(76,175,130,0.3); border-radius:var(--radius); padding:40px; text-align:center; margin-bottom:32px; }

/* Review list */
.review-list { display:flex; flex-direction:column; gap:12px; }
.review-item { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
.review-item-header { display:flex; align-items:flex-start; gap:14px; padding:16px 20px; cursor:pointer; transition:background 0.15s; }
.review-item-header:hover { background:var(--bg3); }
.review-status-icon { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; flex-shrink:0; }
.review-item-q { flex:1; font-size:14px; line-height:1.5; color:var(--text2); }
.review-item-q strong { color:var(--text); }
.review-expand { font-size:12px; color:var(--text3); flex-shrink:0; transition:transform 0.2s; }
.review-item-body { padding:4px 20px 18px; border-top:1px solid var(--border); }
.review-answers { display:flex; flex-direction:column; gap:6px; margin:14px 0 0; }
.review-answer { display:flex; align-items:center; gap:10px; padding:8px 12px; border-radius:var(--radius-sm); font-size:13px; }
.review-answer.correct { background:var(--green-dim); color:var(--green); }
.review-answer.wrong   { background:var(--red-dim);   color:var(--red); }
.review-answer.neutral { background:var(--bg4);       color:var(--text3); }

/* ══════════════════════════════
   ASK ALEX PAGE
══════════════════════════════ */
.ask-page { padding:32px 0 80px; max-width:860px; margin:0 auto; width:100%; }
.ask-page-hero { text-align:center; margin-bottom:36px; }
.ask-page-orb { width:72px; height:72px; border-radius:50%; background:linear-gradient(135deg,var(--teal),var(--blue)); display:flex; align-items:center; justify-content:center; font-size:32px; margin:0 auto 18px; box-shadow:0 0 30px rgba(45,212,191,0.2); }
.ask-page-title { font-family:'Playfair Display',serif; font-size:clamp(26px,4vw,38px); font-weight:700; margin-bottom:10px; }
.ask-page-title span { color:var(--teal); }
.ask-page-sub { font-size:15px; color:var(--text2); max-width:480px; margin:0 auto; line-height:1.7; }

/* Input area */
.ask-input-card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:24px; margin-bottom:20px; }
.ask-input-label { font-size:12px; text-transform:uppercase; letter-spacing:0.08em; color:var(--text3); font-weight:600; margin-bottom:10px; display:flex; align-items:center; gap:8px; }
.ask-textarea { width:100%; background:var(--bg3); border:1px solid var(--border2); border-radius:var(--radius-sm); padding:16px; font-family:'Plus Jakarta Sans',sans-serif; font-size:15px; color:var(--text); line-height:1.65; resize:vertical; min-height:110px; outline:none; transition:border-color 0.2s; }
.ask-textarea:focus { border-color:var(--teal); }
.ask-textarea::placeholder { color:var(--text3); }
.ask-controls { display:flex; align-items:center; justify-content:space-between; margin-top:14px; flex-wrap:wrap; gap:10px; }
.ask-level-wrap { display:flex; align-items:center; gap:8px; }
.ask-level-label { font-size:12px; color:var(--text3); }
.level-pills { display:flex; gap:6px; }
.level-pill { padding:5px 14px; border-radius:999px; border:1px solid var(--border2); background:var(--bg3); font-size:12px; color:var(--text3); cursor:pointer; transition:all 0.15s; font-family:inherit; }
.level-pill.active.beginner   { background:var(--green-dim); color:var(--green); border-color:rgba(76,175,130,0.3); }
.level-pill.active.intermediate{ background:var(--blue-dim);  color:var(--blue);  border-color:rgba(91,156,246,0.3); }
.level-pill.active.advanced   { background:var(--gold-dim);  color:var(--gold);  border-color:rgba(232,184,109,0.3); }
.ask-char-count { font-size:11px; color:var(--text3); }

/* History of asked questions */
.ask-history { display:flex; flex-direction:column; gap:10px; margin-bottom:24px; }
.ask-history-title { font-size:12px; text-transform:uppercase; letter-spacing:0.08em; color:var(--text3); font-weight:600; margin-bottom:10px; }
.ask-history-item { padding:10px 14px; background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius-sm); cursor:pointer; transition:all 0.15s; display:flex; align-items:center; gap:10px; }
.ask-history-item:hover { border-color:var(--teal); background:var(--teal-dim); }
.ask-history-q { flex:1; font-size:13px; color:var(--text2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ask-history-badge { flex-shrink:0; }

/* AI Response for custom questions */
.ask-response { animation:fadeUp 0.5s ease both; }
.ask-response-header { background:linear-gradient(135deg,rgba(45,212,191,0.08),rgba(91,156,246,0.06)); border:1px solid rgba(45,212,191,0.2); border-radius:var(--radius); padding:22px 24px; margin-bottom:16px; position:relative; overflow:hidden; }
.ask-response-header::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,var(--teal),var(--blue)); }
.ask-response-q { font-family:'Playfair Display',serif; font-size:17px; color:var(--text); line-height:1.55; margin-bottom:12px; font-style:italic; }
.ask-response-meta { display:flex; gap:8px; flex-wrap:wrap; }

/* Streaming text effect */
.streaming-cursor::after { content:'|'; animation:blink 1s ease infinite; color:var(--teal); }

/* Long-form explanation sections */
.long-expl { display:flex; flex-direction:column; gap:14px; }
.long-section { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
.long-section-head { display:flex; align-items:center; gap:12px; padding:14px 18px; border-bottom:1px solid var(--border); background:var(--bg3); }
.long-section-icon { width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
.long-section-title { font-size:13px; font-weight:600; }
.long-section-body { padding:18px 20px; font-size:14px; color:var(--text2); line-height:1.75; }
.long-section-body p { margin-bottom:10px; }
.long-section-body p:last-child { margin-bottom:0; }
.long-section-body strong { color:var(--text); }
.long-section-body em { color:var(--gold2); font-style:italic; }

/* Inline code */
.inline-code { background:var(--bg4); border:1px solid var(--border2); border-radius:4px; padding:1px 6px; font-family:monospace; font-size:12px; color:var(--gold2); }

/* Number steps in long explanations */
.num-steps { display:flex; flex-direction:column; gap:12px; }
.num-step { display:flex; gap:14px; padding:12px 14px; background:var(--bg3); border-radius:var(--radius-sm); border:1px solid var(--border); }
.num-step-num { width:24px; height:24px; border-radius:50%; background:linear-gradient(135deg,var(--teal),var(--blue)); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:#fff; flex-shrink:0; }
.num-step-body { flex:1; font-size:13px; color:var(--text2); line-height:1.65; }
.num-step-body strong { color:var(--text); }

/* Related examples */
.related-examples { display:flex; flex-direction:column; gap:8px; }
.related-example { padding:12px 16px; background:var(--teal-dim); border:1px solid rgba(45,212,191,0.15); border-radius:var(--radius-sm); font-size:13px; color:var(--text2); line-height:1.6; }
.related-example-label { font-size:10px; text-transform:uppercase; letter-spacing:0.06em; font-weight:700; color:var(--teal); margin-bottom:4px; }

/* Ask generating state */
.ask-generating { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:40px 24px; text-align:center; }
.ask-gen-orb { width:52px; height:52px; border-radius:50%; background:linear-gradient(135deg,var(--teal),var(--blue)); display:flex; align-items:center; justify-content:center; font-size:24px; margin:0 auto 16px; animation:glow 2s ease infinite; }
.ask-gen-title { font-size:16px; font-weight:600; margin-bottom:8px; }
.ask-gen-sub { font-size:13px; color:var(--text3); }

/* MANAGE */
.manage-page { padding:32px 0 60px; }
.manage-title { font-family:'Playfair Display',serif; font-size:28px; font-weight:700; margin-bottom:6px; }
.manage-sub { font-size:14px; color:var(--text3); margin-bottom:28px; }
.add-question-form { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:24px; margin-bottom:28px; }
.form-group { margin-bottom:16px; }
.form-label { display:block; font-size:12px; font-weight:500; color:var(--text3); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:8px; }
.form-input,.form-textarea { width:100%; padding:11px 14px; background:var(--bg3); border:1px solid var(--border2); border-radius:var(--radius-sm); color:var(--text); font-family:'Plus Jakarta Sans',sans-serif; font-size:14px; outline:none; transition:border-color 0.2s; resize:vertical; }
.form-input:focus,.form-textarea:focus { border-color:var(--gold); }
.form-textarea { min-height:80px; }
.option-inputs { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px; }
.option-input-row { display:flex; align-items:center; gap:8px; }
.option-radio { accent-color:var(--gold); width:14px; height:14px; cursor:pointer; }
.q-table { display:flex; flex-direction:column; gap:10px; }
.q-row { display:flex; align-items:flex-start; gap:14px; padding:14px 18px; background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius-sm); transition:border-color 0.15s; }
.q-row:hover { border-color:var(--border2); }
.q-row-num { width:24px; height:24px; background:var(--bg4); border-radius:50%; font-size:11px; color:var(--text3); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.q-row-body { flex:1; }
.q-row-text { font-size:13px; color:var(--text); margin-bottom:3px; }
.q-row-meta { font-size:11px; color:var(--text3); }
.q-row-del { background:transparent; border:1px solid var(--border); border-radius:var(--radius-sm); color:var(--text3); font-size:11px; padding:4px 10px; cursor:pointer; font-family:inherit; transition:all 0.15s; }
.q-row-del:hover { border-color:var(--red); color:var(--red); background:var(--red-dim); }
.add-success { color:var(--green); font-size:12px; margin-left:10px; animation:fadeIn 0.3s ease; }

/* ── HERO GRADIENT ORBS ── */
.hero-bg-orb { position:absolute; border-radius:50%; pointer-events:none; filter:blur(80px); opacity:0.07; }
.dashboard-hero { position:relative; }

/* ── QUIZ TIMER ── */
.quiz-timer { display:flex; align-items:center; gap:6px; padding:6px 14px; background:var(--bg2); border:1px solid var(--border); border-radius:999px; font-size:13px; font-weight:600; font-family:'Playfair Display',serif; white-space:nowrap; transition:all 0.3s; min-width:64px; justify-content:center; }
.quiz-timer.warn { border-color:rgba(224,92,92,0.4); color:var(--red); background:var(--red-dim); animation:pulse 1s ease infinite; }
.quiz-timer.ok { color:var(--gold); }
.timer-dot { width:6px; height:6px; border-radius:50%; background:currentColor; flex-shrink:0; }

/* ── KEYBOARD HINT ── */
.kb-hint { display:flex; align-items:center; gap:4px; font-size:11px; color:var(--text3); margin-top:6px; }
.kb-key { display:inline-flex; align-items:center; justify-content:center; min-width:20px; height:18px; padding:0 4px; background:var(--bg4); border:1px solid var(--border2); border-bottom-width:2px; border-radius:4px; font-size:10px; font-family:monospace; color:var(--text3); }

/* ── TOAST NOTIFICATIONS ── */
.toast-container { position:fixed; bottom:24px; right:24px; z-index:10000; display:flex; flex-direction:column; gap:8px; pointer-events:none; }
.toast { display:flex; align-items:center; gap:10px; padding:12px 16px; border-radius:var(--radius-sm); font-size:13px; font-weight:500; pointer-events:all; animation:toastIn 0.35s cubic-bezier(0.34,1.56,0.64,1) both; max-width:320px; }
.toast.success { background:#1a2e22; border:1px solid rgba(76,175,130,0.3); color:var(--green); }
.toast.error   { background:#2e1a1a; border:1px solid rgba(224,92,92,0.3); color:var(--red); }
.toast.info    { background:var(--bg3); border:1px solid var(--border2); color:var(--text); }
.toast.exiting { animation:toastOut 0.25s ease forwards; }
@keyframes toastIn  { from{opacity:0;transform:translateX(20px) scale(0.95);} to{opacity:1;transform:none;} }
@keyframes toastOut { from{opacity:1;transform:none;} to{opacity:0;transform:translateX(20px);} }

/* ── EMPTY STATE ── */
.empty-state { text-align:center; padding:60px 20px; background:var(--bg2); border:1px dashed var(--border2); border-radius:var(--radius); }
.empty-state-icon { font-size:40px; margin-bottom:14px; opacity:0.5; }
.empty-state-title { font-family:'Playfair Display',serif; font-size:18px; margin-bottom:6px; }
.empty-state-sub { font-size:13px; color:var(--text3); }

/* ── RESET CONFIRM MODAL ── */
.modal-backdrop { position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:9000; display:flex; align-items:center; justify-content:center; padding:20px; animation:fadeIn 0.2s ease both; backdrop-filter:blur(4px); }
.modal-box { background:var(--bg2); border:1px solid var(--border2); border-radius:var(--radius); padding:32px; max-width:400px; width:100%; animation:popIn 0.3s ease both; }
.modal-title { font-family:'Playfair Display',serif; font-size:22px; font-weight:700; margin-bottom:8px; }
.modal-sub { font-size:14px; color:var(--text2); line-height:1.6; margin-bottom:24px; }
.modal-actions { display:flex; gap:10px; }

/* ── STREAK MILESTONE ── */
.streak-milestone { display:flex; align-items:center; gap:6px; padding:6px 12px; background:linear-gradient(135deg,rgba(232,184,109,0.12),rgba(245,212,154,0.06)); border:1px solid rgba(232,184,109,0.25); border-radius:999px; font-size:13px; animation:glow 3s ease infinite; }

/* ── SUBJECT CARD HOVER GLOW ── */
.subject-card::after { content:''; position:absolute; inset:0; opacity:0; border-radius:var(--radius); background:radial-gradient(circle at 50% 0%,var(--accent-color,var(--gold)),transparent 60%); pointer-events:none; transition:opacity 0.3s; }
.subject-card:hover::after { opacity:0.07; }

/* ── PROGRESS BAR ANIMATED FILL ── */
.progress-fill { animation:progressLoad 0.5s cubic-bezier(0.4,0,0.2,1) both; }
@keyframes progressLoad { from{width:0 !important;} }

@media(max-width:768px){
  .dashboard-hero{grid-template-columns:1fr;}
  .hero-stats{grid-template-columns:1fr 1fr;}
  .option-inputs{grid-template-columns:1fr;}
  .quiz-page{padding:20px 0 40px;}
  .results-grid{grid-template-columns:repeat(2,1fr);}
  .answer-comparison{grid-template-columns:1fr;}
  .practice-grid{grid-template-columns:1fr 1fr;}
  .ask-controls{flex-direction:column;align-items:flex-start;}
  .toast-container{bottom:16px;right:16px;left:16px;}
  .toast{max-width:100%;}
}

function detectLevel(accuracy) {

/* ── TOAST SYSTEM ── */
let _toastId=0;
let _setToasts=null;
function toast(msg,type='info',duration=3000){
  if(!_setToasts) return;
  const id=++_toastId;
  _setToasts(ts=>[...ts,{id,msg,type}]);
  setTimeout(()=>{
    _setToasts(ts=>ts.map(t=>t.id===id?{...t,exiting:true}:t));
    setTimeout(()=>_setToasts(ts=>ts.filter(t=>t.id!==id)),300);
  },duration);
}
function ToastContainer(){
  const [toasts,setToasts]=useState([]);
  useEffect(()=>{ _setToasts=setToasts; return()=>{ _setToasts=null; }; },[]);
  if(!toasts.length) return null;
  const icons={success:'✓',error:'✗',info:'✦'};
  return (
    <div className="toast-container">
      {toasts.map(t=>(
        <div key={t.id} className={`toast ${t.type}${t.exiting?' exiting':''}`}>
          <span>{icons[t.type]||'✦'}</span><span>{t.msg}</span>
        </div>
      ))}
    </div>
  );
}

/* ── QUIZ TIMER ── */
function QuizTimer({onTimeout,paused}){
  const [secs,setSecs]=useState(30);
  useEffect(()=>{
    setSecs(30);
  },[onTimeout]); // reset on new question (onTimeout ref changes)
  useEffect(()=>{
    if(paused) return;
    if(secs<=0){ onTimeout(); return; }
    const t=setTimeout(()=>setSecs(s=>s-1),1000);
    return()=>clearTimeout(t);
  },[secs,paused]);
  const warn=secs<=8;
  return (
    <div className={`quiz-timer ${warn?'warn':'ok'}`}>
      <span className="timer-dot"/>
      <span>{secs}s</span>
    </div>
  );
}

/* ── CLAUDE API HELPER ── */
async function callClaude(prompt, maxTokens=4000) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:maxTokens, messages:[{role:"user",content:prompt}] })
  });
  const data = await res.json();
  return data.content.map(c=>c.text||'').join('');
}

/* ═══════════════════════════════════
   GENERATE FULL QUIZ TUTOR REPORT
═══════════════════════════════════ */
async function generateTutorReport(mistakes, subjectName, allResults, accuracy, overallAccuracy) {
  const level = detectLevel(accuracy);
  const totalQ = allResults.length;
  const correctTopics = allResults.filter(r=>r.chosen===r.ans).map(r=>r.topic);
  const wrongTopics   = mistakes.map(m=>m.topic);
  const topicCounts   = {};
  wrongTopics.forEach(t=>{ topicCounts[t]=(topicCounts[t]||0)+1; });
  const weakestTopic  = Object.entries(topicCounts).sort((a,b)=>b[1]-a[1])[0]?.[0] || '';

  const ctx = mistakes.map((m,i)=>({
    index:i+1, topic:m.topic, question:m.q,
    studentAnswer:m.opts[m.chosen], correctAnswer:m.opts[m.ans],
    allOptions: m.opts,
  }));

  const prompt = `You are Alex, an expert and caring tutor. A student just finished a ${subjectName} quiz.

Performance data:
- Score: ${allResults.filter(r=>r.chosen===r.ans).length}/${totalQ} (${accuracy}%)
- All-time accuracy: ${overallAccuracy}%
- Student level: ${level.label} (${level.desc})
- Weakest topic: ${weakestTopic}
- Topics answered correctly: ${[...new Set(correctTopics)].join(', ') || 'none'}

Mistakes to analyse:
${JSON.stringify(ctx, null, 2)}

Generate a comprehensive JSON tutor report. Every explanation must be genuinely educational — not generic. Adapt ALL language to ${level.code} level.

{
  "opening": "2-3 warm, specific sentences addressing the student's performance. Mention their exact score, acknowledge what they got right, and set an encouraging tone for the review.",
  "patternAnalysis": {
    "summary": "2 sentences identifying the main learning gap or error pattern across ALL mistakes (e.g. confusing process vs result, rushing, formula misapplication).",
    "weakestTopic": "${weakestTopic}",
    "mistakePattern": "One specific pattern name, e.g. 'Confusing formulas under pressure' or 'Misreading question intent'",
    "strengthNote": "1 sentence on what the student clearly understands well (from correct answers)."
  },
  "topicGroups": [
    {
      "topic": "EXACT topic name from mistakes",
      "icon": "single emoji representing the subject matter",
      "mistakeCount": 1,
      "conceptSummary": "2 sentences: what this topic covers and WHY it matters at ${level.code} level.",
      "questions": [
        {
          "questionIndex": 1,
          "whyWrong": "3 sentences: exactly WHY their specific answer '${ctx[0]?.studentAnswer||''}' was wrong. Name the misconception. Explain the logical error they made. Be direct but kind.",
          "whyCorrect": "2 sentences: explain WHY the correct answer is right from first principles. Don't just say it's correct — explain the underlying logic or fact.",
          "commonMistake": "1 sentence: the specific trap most students fall into with this exact concept.",
          "steps": [
            "Step 1: Establish the foundational concept or fact needed",
            "Step 2: Show how to reason through the question correctly",
            "Step 3: Arrive at the correct answer with clear logic",
            "Step 4 (if needed): Double-check or rule out wrong options"
          ],
          "definition": {
            "term": "The key term or concept being tested",
            "meaning": "Clear definition appropriate for ${level.code} level. Use an analogy if helpful."
          },
          "example": "A concrete real-world example or worked example that illustrates the correct concept. Make it memorable.",
          "memoryHook": "A creative, level-appropriate mnemonic, analogy, or visual image to remember the correct answer."
        }
      ],
      "topicTip": "One concrete, actionable exam strategy for this topic. Be specific, not generic."
    }
  ],
  "practiceRecommendations": [
    {
      "topic": "Topic name",
      "reason": "1 sentence why this will specifically help THIS student based on their mistakes.",
      "difficulty": "easy|medium|hard",
      "sampleQuestion": "A genuine practice question they can try right now.",
      "hint": "A short hint for the sample question."
    }
  ],
  "studyPlan": [
    {
      "priority": 1,
      "action": "Short imperative action e.g. 'Review percentage calculations'",
      "detail": "1-2 sentences: exactly how to do this. Suggest a specific method or resource type.",
      "timeEstimate": "e.g. '20 minutes'"
    }
  ],
  "closing": "2-3 warm, specific sentences. Note one concrete thing they did well. Give a motivating forward-looking statement. Sign off as — Alex"
}

Rules: 
- Group questions by topic (merge if same topic).
- steps array: 3-4 steps minimum, each genuinely educational.
- definitions: use simple language for beginner, technical terms for advanced.
- examples: concrete, specific, memorable.
- studyPlan: 3-4 items ordered by priority.
- Return ONLY valid JSON. No markdown fences.`;

  try {
    const text = await callClaude(prompt, 5000);
    return JSON.parse(text.replace(/```json|```/g,'').trim());
  } catch(e) {
    // Fallback
    const grouped={};
    mistakes.forEach(m=>{ if(!grouped[m.topic]) grouped[m.topic]=[]; grouped[m.topic].push(m); });
    return {
      opening:`You scored ${accuracy}% — let's go through your mistakes carefully so every concept clicks.`,
      patternAnalysis:{ summary:`You made ${mistakes.length} mistake${mistakes.length!==1?'s':''}. Let's work through each one.`, weakestTopic, mistakePattern:'Concept gaps', strengthNote:'You answered several questions correctly, showing solid foundational knowledge.' },
      topicGroups: Object.entries(grouped).map(([topic,qs])=>({
        topic, icon:"📚", mistakeCount:qs.length, conceptSummary:`${topic} is an important area to review.`,
        questions: qs.map((q,i)=>({
          questionIndex:i,
          whyWrong:`You chose "${q.opts[q.chosen]}" but the correct answer is "${q.opts[q.ans]}". This is a common point of confusion.`,
          whyCorrect:`"${q.opts[q.ans]}" is correct based on the core definition of ${topic}.`,
          commonMistake:`Many students confuse this concept — careful re-reading helps.`,
          steps:[`Recall the definition of ${topic}.`,`Apply it to the question.`,`"${q.opts[q.ans]}" follows directly.`],
          definition:{term:topic, meaning:`The key concept in ${topic} being tested here.`},
          example:`Think about a real-world application of ${topic} to remember this.`,
          memoryHook:`When you see this type of question, pause and recall the core rule of ${topic}.`
        })),
        topicTip:`Practice ${topic} problems regularly to build confidence.`
      })),
      practiceRecommendations: Object.keys(grouped).slice(0,3).map(t=>({ topic:t, reason:`You had mistakes here.`, difficulty:"medium", sampleQuestion:`Practice a ${t} problem.`, hint:`Focus on the core concept.` })),
      studyPlan:[{priority:1,action:`Review ${weakestTopic}`,detail:`Work through 5 practice problems on ${weakestTopic}.`,timeEstimate:'20 minutes'}],
      closing:`Great effort — every mistake is a step toward mastery. Review these explanations and try again. — Alex`
    };
  }
}

/* ═══════════════════════════════════
   GENERATE CUSTOM QUESTION EXPLANATION
═══════════════════════════════════ */
async function generateCustomExplanation(question, level) {
  const levelDesc = level==='beginner' ? 'Use very simple language, everyday analogies, no jargon. Assume no prior knowledge.' :
                    level==='intermediate' ? 'Use subject terminology with brief explanations. Assume secondary-school knowledge.' :
                    'Use full technical language. Assume strong academic foundation. Include nuance.';

  const prompt = `You are Alex, an expert tutor. A student has asked you to explain the following question or concept:

"${question}"

Student level: ${level} — ${levelDesc}

Generate a thorough, long-form JSON explanation that feels like a real tutor sitting with the student:

{
  "questionType": "One of: math|science|english|history|logic|general",
  "subject": "The specific subject area (e.g. 'Algebra', 'Cell Biology', 'Grammar')",
  "shortAnswer": "The direct answer in 1-2 sentences. Clear and unambiguous.",
  "explanation": {
    "overview": "2-3 sentences: the big picture. What is this question really asking? What concept does it test? Set the context.",
    "coreDefinitions": [
      { "term": "Key term 1", "definition": "Clear definition at ${level} level", "example": "Brief example" },
      { "term": "Key term 2", "definition": "Clear definition", "example": "Brief example" }
    ],
    "stepByStep": [
      "Step 1: Start with what we know / the given information",
      "Step 2: Identify what concept or rule applies",
      "Step 3: Apply the concept with clear reasoning",
      "Step 4: Arrive at the answer",
      "Step 5: Verify or double-check (if applicable)"
    ],
    "whyItWorks": "2-3 sentences explaining the underlying principle or reason why the answer is correct. Go deeper than just restating the answer.",
    "commonConfusion": "2 sentences: what most students get confused about on this topic and why.",
    "realWorldExample": "A concrete, memorable real-world scenario or application that illustrates this concept. Make it vivid and relatable.",
    "visualAnalogy": "A visual or physical analogy to help the student picture the concept in their mind."
  },
  "keyTakeaways": [
    "Takeaway 1: The most important thing to remember",
    "Takeaway 2: A useful rule of thumb",
    "Takeaway 3: How to recognise this type of question in an exam"
  ],
  "practiceQuestions": [
    { "question": "A slightly easier version of this concept", "hint": "Helpful hint" },
    { "question": "A similar-difficulty practice question", "hint": "Helpful hint" },
    { "question": "A harder extension question", "hint": "Helpful hint" }
  ],
  "studyTip": "One specific, actionable tip for mastering this topic."
}

Rules:
- stepByStep: minimum 4 steps, each genuinely walking through the reasoning.
- coreDefinitions: 1-3 most important terms only.
- realWorldExample: must be specific and vivid, not vague.
- Adapt ALL language strictly to ${level} level.
- Return ONLY valid JSON. No markdown fences.`;

  try {
    const text = await callClaude(prompt, 3500);
    return JSON.parse(text.replace(/```json|```/g,'').trim());
  } catch(e) {
    return {
      questionType:'general', subject:'General',
      shortAnswer:`This is a great question about "${question.slice(0,60)}...". Let me break it down for you.`,
      explanation:{
        overview:`This question tests your understanding of a core concept. Let's work through it step by step.`,
        coreDefinitions:[{term:'Key concept',definition:'The fundamental idea being tested.',example:'A practical example of this concept.'}],
        stepByStep:['Step 1: Read the question carefully.','Step 2: Identify the key information.','Step 3: Apply the relevant concept.','Step 4: Arrive at your answer.'],
        whyItWorks:`Understanding this concept requires thinking carefully about the underlying principles involved.`,
        commonConfusion:`Students often rush this type of question without fully reading all options.`,
        realWorldExample:`Think about how this concept applies in everyday life to remember it better.`,
        visualAnalogy:`Imagine this concept as a building — you need a solid foundation before adding floors.`
      },
      keyTakeaways:['Re-read the question carefully.','Identify the key concept being tested.','Check your answer against all options.'],
      practiceQuestions:[{question:`Try a similar question on this topic.`,hint:`Focus on the core concept.`}],
      studyTip:`Practice regularly and review mistakes immediately to build lasting understanding.`
    };
  }
}

  return (
    <div className="results-score-ring">
      <svg viewBox="0 0 128 128">
        <circle className="ring-bg" cx="64" cy="64" r={r}/>
        <circle className="ring-fill" cx="64" cy="64" r={r} strokeDasharray={circ} strokeDashoffset={circ*(1-p/100)}/>
      </svg>
      <div className="results-score-center">
        <div className="results-score-big">{score}</div>
        <div className="results-score-pct">{p}%</div>
      </div>
    </div>
  );
}

/* ── QUIZ PAGE ── */
function QuizPage({data,setData,subjectKey,goResults,goBack}){
  const subject=data.bank[subjectKey];
  const [questions]=useState(()=>shuffle(subject.questions));
  const [qIdx,setQIdx]=useState(0);
  const [selected,setSelected]=useState(null);
  const [answered,setAnswered]=useState(false);
  const [results,setResults]=useState([]);
  const [timerKey,setTimerKey]=useState(0);

  const q=questions[qIdx], total=questions.length, isLast=qIdx===total-1;
  const currentScore=results.filter(r=>r.chosen===r.ans).length;

  function handleChoice(i){
    if(answered) return;
    setSelected(i); setAnswered(true);
    setResults(r=>[...r,{q:q.q,opts:q.opts,ans:q.ans,chosen:i,topic:q.topic}]);
    if(i===q.ans) toast('Correct! ✓','success',1500);
  }

  function handleTimeout(){
    if(answered) return;
    // Treat timeout as a wrong answer (pick a non-answer slot)
    const wrongIdx = q.opts.findIndex((_,i)=>i!==q.ans);
    handleChoice(wrongIdx);
    toast("Time's up!",'error',2000);
  }

  function next(){
    if(isLast){
      const allResults=[...results];
      const s=allResults.filter(r=>r.chosen===r.ans).length;
      const session={subject:subjectKey,score:s,total,date:new Date().toISOString(),results:allResults};
      setData(prev=>{
        const u={...prev,totalAnswered:prev.totalAnswered+total,totalCorrect:prev.totalCorrect+s,streak:prev.streak+1,history:[...prev.history,session]};
        saveData(u); return u;
      });
      goResults(session);
    } else { setQIdx(i=>i+1); setSelected(null); setAnswered(false); setTimerKey(k=>k+1); }
  }

  // Keyboard shortcuts
  useEffect(()=>{
    function onKey(e){
      if(['1','2','3','4'].includes(e.key)&&!answered){ handleChoice(parseInt(e.key)-1); }
      if((e.key==='Enter'||e.key===' ')&&answered){ next(); }
    }
    window.addEventListener('keydown',onKey);
    return()=>window.removeEventListener('keydown',onKey);
  },[answered,qIdx]);

  return (
    <div className="quiz-page">
      <div className="quiz-topbar">
        <button className="btn btn-ghost btn-sm" onClick={goBack}>← Back</button>
        <div className="quiz-progress-wrap">
          <div className="quiz-progress-label"><span>Question {qIdx+1} of {total}</span><span>{subject.name}</span></div>
          <div className="progress-track"><div className="progress-fill" key={qIdx} style={{width:`${((qIdx+1)/total)*100}%`}}/></div>
        </div>
        <QuizTimer key={timerKey} onTimeout={handleTimeout} paused={answered}/>
        <div className="quiz-score-badge"><span>Score</span><span className="score-num">{currentScore}</span></div>
      </div>

      <div className="question-card" key={qIdx}>
        <div className="question-header">
          <div className="question-meta">
            <span className="badge" style={{background:`${subject.color}18`,color:subject.color,border:`1px solid ${subject.color}30`}}>{subject.icon} {subject.name}</span>
            <span className="badge badge-blue">{q.topic}</span>
            <span className="question-number" style={{marginLeft:'auto'}}>#{qIdx+1}</span>
          </div>
          <div className="question-text">{q.q}</div>
        </div>
        <div className="options-list">
          {q.opts.map((opt,i)=>{
            let cls='option-btn';
            if(answered){ if(i===q.ans) cls+=' correct'; else if(i===selected&&i!==q.ans) cls+=' wrong'; else cls+=' dimmed'; }
            return (
              <button key={i} className={cls} onClick={()=>handleChoice(i)} disabled={answered}>
                <span className="option-letter">{String.fromCharCode(65+i)}</span>
                <span className="option-text">{opt}</span>
                {!answered&&<span className="kb-key" style={{marginLeft:'auto',flexShrink:0}}>{i+1}</span>}
              </button>
            );
          })}
        </div>
        {answered&&(
          <div className="feedback-panel">
            {selected===q.ans?(
              <div className="feedback-correct"><span style={{fontSize:18}}>✓</span><span>Correct! Well done.</span></div>
            ):(
              <div className="feedback-wrong">
                <span style={{fontSize:18,flexShrink:0}}>✗</span>
                <div>
                  <div style={{fontWeight:500,marginBottom:3}}>Not quite — correct answer: <span style={{color:'var(--green)',fontWeight:600}}>{q.opts[q.ans]}</span></div>
                  <div className="feedback-wrong-detail">Your full AI explanation appears in the tutor report after the quiz.</div>
                </div>
              </div>
            )}
            <div className="feedback-actions">
              <button className="btn btn-primary" onClick={next}>{isLast?'Finish & Get AI Report →':'Next Question →'}</button>
              {selected!==q.ans&&<button className="btn btn-secondary" onClick={()=>{setSelected(null);setAnswered(false);setResults(r=>r.slice(0,-1));setTimerKey(k=>k+1);}}>↻ Retry</button>}
            </div>
            <div className="kb-hint" style={{marginTop:10}}><span className="kb-key">Enter</span><span style={{marginLeft:4}}>for next question</span></div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ── RESULTS PAGE ── */
function ResultsPage({session,data,startQuiz,goHome}){
  const [expanded,setExpanded]=useState(null);
  const [reportState,setReportState]=useState('generating');
  const [genStage,setGenStage]=useState(0);
  const [report,setReport]=useState(null);
  const generated=useRef(false);

  const score=session.results.filter(r=>r.chosen===r.ans).length;
  const total=session.results.length;
  const accuracy=pct(score,total);
  const mistakes=session.results.filter(r=>r.chosen!==r.ans);
  const subject=data.bank[session.subject];
  const historyScores=data.history.slice(-7).map(h=>pct(h.score,h.total));
  const overallAccuracy=pct(data.totalCorrect,data.totalAnswered);
  const msg=accuracy>=90?"Outstanding! 🏆":accuracy>=70?"Well done! 🎉":accuracy>=50?"Good effort! 💪":"Keep practising! 📖";

  useEffect(()=>{
    if(generated.current) return;
    generated.current=true;
    if(!mistakes.length){ setReportState('done'); setReport({opening:'',topicGroups:[],practiceRecommendations:[],studyPlan:[],closing:''}); return; }
    let si=0;
    const iv=setInterval(()=>{ si++; setGenStage(si); if(si>=6) clearInterval(iv); },700);
    generateTutorReport(mistakes,subject.name,session.results,accuracy,overallAccuracy).then(r=>{
      clearInterval(iv); setGenStage(7);
      setTimeout(()=>{ setReport(r); setReportState('done'); },400);
    });
    return ()=>clearInterval(iv);
  },[]);

  return (
    <div className="results-page animate-fadein">

        <ScoreRing score={score} total={total}/>
        <h1 className="results-title">{msg}</h1>

      <div className="results-grid" style={{marginBottom:36}}>
        {[
          {val:score,              lbl:'Correct',     color:'var(--green)'},
          {val:total-score,        lbl:'Incorrect',   color:'var(--red)'},
          {val:accuracy+'%',       lbl:'This quiz',   color:'var(--gold)'},
          {val:overallAccuracy+'%',lbl:'All-time',    color:'var(--text)'},
        ].map((m,i)=>(
          <div className="results-metric" key={i}>
            <div className="results-metric-val" style={{color:m.color}}>{m.val}</div>
            <div className="results-metric-lbl">{m.lbl}</div>
          </div>
        ))}
      </div>

      {historyScores.length>1&&(
        <div className="improvement-section">
          <div className="section-header"><h2 className="section-title">Progress</h2><span className="section-sub">Last {historyScores.length} sessions</span></div>
          <div className="chart-wrap">
            <div className="bars">
              {historyScores.map((s,i)=>(
                <div className="bar-col" key={i}>
                  <div className="bar-val" style={{color:i===historyScores.length-1?'var(--gold)':'var(--text3)'}}>{s}%</div>
                  <div className={`bar${i===historyScores.length-1?' current':''}`} style={{height:`${s}%`,minHeight:4}}/>
                  <div className="bar-label">S{i+1}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* AI TUTOR REPORT */}
      <div style={{marginBottom:48}}>
        <div className="section-header" style={{marginBottom:20}}>
          <h2 className="section-title">AI Tutor Report</h2>
          {reportState==='done'&&mistakes.length>0&&<span className="badge badge-gold">✦ Deep analysis</span>}
        </div>
        {reportState==='generating'&&<GeneratingReport stage={genStage}/>}
        {reportState==='done'&&report&&<TutorReport report={report} mistakes={mistakes} subject={subject} accuracy={accuracy}/>}
      </div>

      {/* Raw review */}
      <div>
        <div className="section-header"><h2 className="section-title">All questions</h2><span className="section-sub">Tap to expand</span></div>
        <div className="review-list">
          {session.results.map((r,i)=>{
            const ok=r.chosen===r.ans, isOpen=expanded===i;
            return (
              <div className="review-item" key={i}>
                <div className="review-item-header" onClick={()=>setExpanded(isOpen?null:i)}>
                  <div className="review-status-icon" style={{background:ok?'var(--green-dim)':'var(--red-dim)',color:ok?'var(--green)':'var(--red)'}}>{ok?'✓':'✗'}</div>
                  <div className="review-item-q"><strong>Q{i+1}.</strong> {r.q}</div>
                  <div className="review-expand" style={{transform:isOpen?'rotate(180deg)':'none'}}>▾</div>
                </div>
                {isOpen&&(
                  <div className="review-item-body animate-fadeup">
                    <div className="review-answers">
                      {r.opts.map((opt,oi)=>{
                        let cls='review-answer neutral';
                        if(oi===r.ans) cls='review-answer correct';
                        else if(oi===r.chosen&&oi!==r.ans) cls='review-answer wrong';
                        return <div className={cls} key={oi}><span>{String.fromCharCode(65+oi)}.</span><span style={{flex:1}}>{opt}</span>{oi===r.ans&&<span>✓ Correct</span>}{oi===r.chosen&&oi!==r.ans&&<span>Your answer</span>}</div>;
                      })}
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}
