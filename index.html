      setData(prev=>{
        const entry={question:q,level,date:new Date().toISOString(),subject:r.subject||'General'};
        const updated={...prev,askHistory:[...(prev.askHistory||[]).slice(-19),entry]};
        saveData(updated); return updated;
      });
      setQuestion('');
    } finally { setLoading(false); }
  }

  function loadFromHistory(item){
    setQuestion(item.question);
    setLevel(item.level);
    textareaRef.current?.focus();
  }

  const sectionConfig=[
    {key:'overview',      icon:'🗺',  title:'Overview',             color:'var(--text3)',    bg:'var(--bg3)'},
    {key:'coreDefinitions',icon:'📖', title:'Key Definitions',      color:'var(--purple)',   bg:'var(--purple-dim)'},
    {key:'stepByStep',    icon:'🪜',  title:'Step-by-step reasoning',color:'var(--gold)',     bg:'var(--gold-dim)'},
    {key:'whyItWorks',    icon:'⚙',  title:'Why it works',          color:'var(--blue)',     bg:'var(--blue-dim)'},
    {key:'commonConfusion',icon:'⚠', title:'Common confusion',      color:'var(--red)',      bg:'var(--red-dim)'},
    {key:'realWorldExample',icon:'🌍',title:'Real-world example',    color:'var(--teal)',     bg:'var(--teal-dim)'},
    {key:'visualAnalogy', icon:'🎨',  title:'Visual analogy',        color:'var(--green)',    bg:'var(--green-dim)'},
  ];

  const levelColor={beginner:'var(--green)',intermediate:'var(--blue)',advanced:'var(--gold)'};

  return (
    <div className="ask-page animate-fadein">
      <div className="ask-page-hero">
        <div className="ask-page-orb">✦</div>
        <h1 className="ask-page-title">Ask <span>Alex</span></h1>
        <p className="ask-page-sub">Type any question or topic — a maths problem, a science concept, a grammar rule, a historical event — and get a full tutor-quality explanation.</p>
      </div>

      {/* Input */}
      <div className="ask-input-card animate-fadeup" style={{animationDelay:'0.1s'}}>
        <div className="ask-input-label">
          <span>✦</span> Your question
        </div>
        <textarea
          ref={textareaRef}
          className="ask-textarea"
          value={question}
          onChange={e=>setQuestion(e.target.value)}
          placeholder="e.g. 'How do I solve simultaneous equations?' or 'What caused World War I?' or 'Explain the difference between its and it\'s'"
          onKeyDown={e=>{ if(e.key==='Enter'&&(e.ctrlKey||e.metaKey)) handleAsk(); }}
        />
        <div className="ask-controls">
          <div className="ask-level-wrap">
            <span className="ask-level-label">Level:</span>
            <div className="level-pills">
              {['beginner','intermediate','advanced'].map(l=>(
                <button key={l} className={`level-pill${level===l?' active '+l:''}`} onClick={()=>setLevel(l)}>{cap(l)}</button>
              ))}
            </div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <span className="ask-char-count">{question.length}/500</span>
            <button className="btn btn-teal" onClick={handleAsk} disabled={!question.trim()||loading||question.length>500}>
              {loading?<><span className="spinner" style={{width:16,height:16,borderWidth:'1.5px',borderTopColor:'var(--teal)'}}/> Generating...</>:<>✦ Get explanation</>}
            </button>
          </div>
        </div>
        <div style={{marginTop:8,fontSize:11,color:'var(--text3)'}}>Tip: Ctrl+Enter to submit • Be specific for the best explanation</div>
      </div>

      {/* History */}
      {!loading&&!response&&askHistory.length>0&&(
        <div className="animate-fadeup" style={{animationDelay:'0.15s',marginBottom:24}}>
          <div className="ask-history-title">Recent questions</div>
          <div className="ask-history">
            {askHistory.map((item,i)=>(
              <div className="ask-history-item" key={i} onClick={()=>loadFromHistory(item)}>
                <span style={{fontSize:16,flexShrink:0}}>↩</span>
                <span className="ask-history-q">{item.question}</span>
                <span className="badge ask-history-badge" style={{background:`${levelColor[item.level]||'var(--blue)'}18`,color:levelColor[item.level]||'var(--blue)',border:`1px solid ${levelColor[item.level]||'var(--blue)'}30`,fontSize:10}}>{item.level}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Generating state */}
      {loading&&(
        <div className="ask-generating animate-fadein">
          <div className="ask-gen-orb">✦</div>
          <div className="ask-gen-title">Alex is thinking...</div>
          <div className="ask-gen-sub">Writing a thorough, personalised explanation for your question at <strong style={{color:levelColor[level]}}>{cap(level)}</strong> level.</div>
        </div>
      )}

      {/* Response */}
      {response&&!loading&&(
        <div className="ask-response animate-fadeup">
          {/* Response header */}
          <div className="ask-response-header">
            <div className="ask-response-q">"{response.question}"</div>
            <div className="ask-response-meta">
              <span className="badge badge-teal">✦ Alex</span>
              <span className="badge" style={{background:`${levelColor[response.level]}18`,color:levelColor[response.level],border:`1px solid ${levelColor[response.level]}30`}}>{cap(response.level)}</span>
              {response.result.subject&&<span className="badge badge-blue">{response.result.subject}</span>}
            </div>
          </div>

          {/* Short answer */}
          <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderLeft:`3px solid var(--gold)`,borderRadius:'var(--radius-sm)',padding:'16px 20px',marginBottom:14}}>
            <div style={{fontSize:11,textTransform:'uppercase',letterSpacing:'0.08em',color:'var(--gold)',fontWeight:700,marginBottom:6}}>Short answer</div>
            <div style={{fontSize:15,color:'var(--text)',lineHeight:1.65,fontFamily:"'Playfair Display',serif",fontStyle:'italic'}}>{response.result.shortAnswer}</div>
          </div>

          {/* Explanation sections */}
          <div className="long-expl">
            {sectionConfig.map((sec,si)=>{
              const content=response.result.explanation?.[sec.key];
              if(!content||(Array.isArray(content)&&content.length===0)) return null;
              const isOpen=expandedSection===null||expandedSection===si;

              return (
                <div className="long-section" key={si} style={{animationDelay:`${si*0.06}s`}} className="long-section animate-slidein">
                  <div className="long-section-head" onClick={()=>setExpandedSection(isOpen&&expandedSection===si?null:si)} style={{cursor:'pointer'}}>
                    <div className="long-section-icon" style={{background:sec.bg,color:sec.color}}>{sec.icon}</div>
                    <div className="long-section-title">{sec.title}</div>
                    <div style={{marginLeft:'auto',fontSize:12,color:'var(--text3)',transition:'transform 0.2s',transform:isOpen&&expandedSection===si?'rotate(180deg)':'none'}}>▾</div>
                  </div>
                  {(isOpen||expandedSection===null)&&(
                    <div className="long-section-body">
                      {/* Render based on section type */}
                      {sec.key==='overview'&&typeof content==='string'&&<p>{content}</p>}

                      {sec.key==='coreDefinitions'&&Array.isArray(content)&&(
                        <div style={{display:'flex',flexDirection:'column',gap:12}}>
                          {content.map((def,di)=>(
                            <div key={di} style={{background:'var(--bg4)',borderRadius:'var(--radius-sm)',padding:'12px 14px'}}>
                              <div style={{fontSize:13,fontWeight:600,color:'var(--purple)',marginBottom:4}}>{def.term}</div>
                              <div style={{fontSize:13,color:'var(--text2)',lineHeight:1.65,marginBottom:def.example?6:0}}>{def.definition}</div>
                              {def.example&&<div style={{fontSize:12,color:'var(--text3)',fontStyle:'italic'}}>Example: {def.example}</div>}
                            </div>
                          ))}
                        </div>
                      )}

                      {sec.key==='stepByStep'&&Array.isArray(content)&&(
                        <div className="num-steps">
                          {content.map((step,si2)=>(
                            <div className="num-step" key={si2} style={{animationDelay:`${si2*0.07}s`}}>
                              <div className="num-step-num">{si2+1}</div>
                              <div className="num-step-body">{step}</div>
                            </div>
                          ))}
                        </div>
                      )}

                      {(sec.key==='whyItWorks'||sec.key==='commonConfusion')&&typeof content==='string'&&<p>{content}</p>}

                      {sec.key==='realWorldExample'&&typeof content==='string'&&(
                        <div className="related-example">
                          <div className="related-example-label">🌍 Example</div>
                          {content}
                        </div>
                      )}

                      {sec.key==='visualAnalogy'&&typeof content==='string'&&(
                        <div style={{display:'flex',gap:12,alignItems:'flex-start'}}>
                          <span style={{fontSize:28,flexShrink:0}}>🎨</span>
                          <p style={{fontStyle:'italic',color:'var(--text2)'}}>{content}</p>
                        </div>
                      )}
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {/* Key takeaways */}
          {response.result.keyTakeaways?.length>0&&(
            <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:'20px 22px',marginTop:14}}>
              <div style={{fontSize:13,fontWeight:600,marginBottom:12,display:'flex',alignItems:'center',gap:8}}><span>⭐</span> Key takeaways</div>
              <div style={{display:'flex',flexDirection:'column',gap:10}}>
                {response.result.keyTakeaways.map((t,i)=>(
                  <div key={i} style={{display:'flex',gap:10,alignItems:'flex-start'}}>
                    <span style={{width:20,height:20,borderRadius:'50%',background:'var(--gold-dim)',border:'1px solid rgba(232,184,109,0.25)',color:'var(--gold)',fontSize:10,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,marginTop:2}}>{i+1}</span>
                    <span style={{fontSize:13,color:'var(--text2)',lineHeight:1.65}}>{t}</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Practice questions */}
          {response.result.practiceQuestions?.length>0&&(
            <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:'20px 22px',marginTop:14}}>
              <div style={{fontSize:13,fontWeight:600,marginBottom:12,display:'flex',alignItems:'center',gap:8}}><span>🎯</span> Practice questions to try next</div>
              <div style={{display:'flex',flexDirection:'column',gap:10}}>
                {response.result.practiceQuestions.map((pq,i)=>(
                  <div key={i} style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:'var(--radius-sm)',padding:'12px 16px'}}>
                    <div style={{fontSize:13,color:'var(--text)',marginBottom:4}}>{i+1}. {pq.question}</div>
                    {pq.hint&&<div style={{fontSize:11,color:'var(--text3)',fontStyle:'italic'}}>Hint: {pq.hint}</div>}
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Study tip */}
          {response.result.studyTip&&(
            <div className="exam-tip-box" style={{marginTop:14}}>
              <span className="exam-tip-label">📌 Study Tip</span>
              {response.result.studyTip}
            </div>
          )}

          {/* Ask another */}
          <div style={{textAlign:'center',marginTop:24}}>
            <button className="btn btn-teal" onClick={()=>{setResponse(null);textareaRef.current?.focus();}}>✦ Ask another question</button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── MANAGE PAGE ── */
function ManagePage({data,setData}){
  const [cur,setCur]=useState(Object.keys(data.bank)[0]);
  const [form,setForm]=useState({q:'',opts:['','','',''],ans:0,topic:''});
  const [deleteIdx,setDeleteIdx]=useState(null);
  const [newSub,setNewSub]=useState('');

  function handleAdd(){
    if(!form.q.trim()){toast('Please enter a question.','error');return;}
    if(form.opts.some(o=>!o.trim())){toast('Fill all 4 options.','error');return;}
    const q={q:form.q.trim(),opts:form.opts.map(o=>o.trim()),ans:form.ans,topic:form.topic.trim()||'General'};
    setData(prev=>{const u={...prev,bank:{...prev.bank,[cur]:{...prev.bank[cur],questions:[...prev.bank[cur].questions,q]}}};saveData(u);return u;});
    setForm({q:'',opts:['','','',''],ans:0,topic:''});
    toast('Question added!','success');
  }
  function handleDelete(idx){
    setData(prev=>{const u={...prev,bank:{...prev.bank,[cur]:{...prev.bank[cur],questions:prev.bank[cur].questions.filter((_,i)=>i!==idx)}}};saveData(u);return u;});
    setDeleteIdx(null);
    toast('Question deleted.','info');
  }
  function handleAddSub(){
    const name=newSub.trim(); if(!name) return;
    const key=name.toLowerCase().replace(/\s+/g,'_');
    if(data.bank[key]){toast('Subject already exists.','error');return;}
    const icons=['📖','🔬','🎨','🌍','💻','🎵'];
    setData(prev=>{const u={...prev,bank:{...prev.bank,[key]:{name,icon:icons[Math.floor(Math.random()*icons.length)],color:'#9a9891',desc:'Custom subject',questions:[]}}};saveData(u);return u;});
    setCur(key); setNewSub('');
    toast(`Subject "${name}" created.`,'success');
  }
  const qs=data.bank[cur]?.questions||[];
  return (
    <div className="manage-page animate-fadein">
      {deleteIdx!==null&&(
        <div className="modal-backdrop" onClick={e=>e.target===e.currentTarget&&setDeleteIdx(null)}>
          <div className="modal-box animate-popin">
            <div className="modal-title">Delete this question?</div>
            <div className="modal-sub" style={{fontSize:13,color:'var(--text3)'}}>{qs[deleteIdx]?.q}</div>
            <div className="modal-actions">
              <button className="btn btn-secondary" style={{flex:1}} onClick={()=>setDeleteIdx(null)}>Cancel</button>
              <button className="btn" style={{flex:1,background:'var(--red-dim)',color:'var(--red)',border:'1px solid rgba(224,92,92,0.3)'}} onClick={()=>handleDelete(deleteIdx)}>Delete</button>
            </div>
          </div>
        </div>
      )}
      <h1 className="manage-title">My Question Bank</h1>
      <p className="manage-sub">Add custom questions — the topic label is used to group mistakes in the AI tutor report</p>
      <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:24,alignItems:'center'}}>
        {Object.keys(data.bank).map(k=>(
          <button key={k} className={`nav-btn${k===cur?' active':''}`} style={{borderRadius:8,padding:'8px 14px'}} onClick={()=>setCur(k)}>
            {data.bank[k].icon} {data.bank[k].name} <span style={{opacity:0.5,fontSize:11}}>({data.bank[k].questions.length})</span>
          </button>
        ))}
        <div style={{display:'flex',gap:6}}>
          <input className="form-input" value={newSub} onChange={e=>setNewSub(e.target.value)} placeholder="New subject..." style={{width:160,height:38}} onKeyDown={e=>e.key==='Enter'&&handleAddSub()}/>
          <button className="btn btn-secondary btn-sm" onClick={handleAddSub}>+ Add</button>
        </div>
      </div>
      <div className="add-question-form">
        <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:18,marginBottom:18}}>Add to {data.bank[cur]?.name}</h3>
        <div className="form-group"><label className="form-label">Question</label><textarea className="form-textarea" value={form.q} onChange={e=>setForm(f=>({...f,q:e.target.value}))} placeholder="Type your question..."/></div>
        <div className="form-group">
          <label className="form-label">Options <span style={{textTransform:'none',letterSpacing:0,color:'var(--text3)'}}>— select the correct one</span></label>
          <div className="option-inputs">
            {[0,1,2,3].map(i=>(
              <div className="option-input-row" key={i}>
                <input type="radio" className="option-radio" name="cor" value={i} checked={form.ans===i} onChange={()=>setForm(f=>({...f,ans:i}))}/>
                <input className="form-input" value={form.opts[i]} onChange={e=>setForm(f=>{const o=[...f.opts];o[i]=e.target.value;return{...f,opts:o};})} placeholder={`Option ${String.fromCharCode(65+i)}`}/>
              </div>
            ))}
          </div>
        </div>
        <div className="form-group"><label className="form-label">Topic <span style={{textTransform:'none',letterSpacing:0,color:'var(--text3)'}}>— groups mistakes in AI report</span></label><input className="form-input" value={form.topic} onChange={e=>setForm(f=>({...f,topic:e.target.value}))} placeholder="e.g. Algebra, Grammar..." style={{maxWidth:300}}/></div>
        <button className="btn btn-primary" onClick={handleAdd}>Add Question</button>
      </div>
      <div className="section-header"><h2 className="section-title">{data.bank[cur]?.name}</h2><span className="section-sub">{qs.length} questions</span></div>
      {!qs.length?(
        <div className="empty-state">
          <div className="empty-state-icon">📝</div>
          <div className="empty-state-title">No questions yet</div>
          <div className="empty-state-sub">Add your first question above</div>
        </div>
      ):(
        <div className="q-table">
          {qs.map((q,i)=>(
            <div className="q-row" key={i}>
              <div className="q-row-num">{i+1}</div>
              <div className="q-row-body"><div className="q-row-text">{q.q}</div><div className="q-row-meta">Correct: {q.opts[q.ans]} · {q.topic}</div></div>
              <button className="q-row-del" onClick={()=>setDeleteIdx(i)}>Delete</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ── APP ROOT ── */
function App(){
  const [data,setData]=useState(()=>loadData());
  const [page,setPage]=useState('dashboard');
  const [quizSubject,setQuizSubject]=useState(null);
  const [quizKey,setQuizKey]=useState(0);
  const [session,setSession]=useState(null);

  function startQuiz(k){ setQuizSubject(k); setQuizKey(n=>n+1); setSession(null); setPage('quiz'); }
  function handleResults(s){ setSession(s); setPage('results'); }
  function handleReset(){
    const fresh={ bank:JSON.parse(JSON.stringify(DEFAULT_BANK)), history:[], totalAnswered:0, totalCorrect:0, streak:0, askHistory:[] };
    saveData(fresh); setData(fresh); setPage('dashboard'); setSession(null);
  }

  return (
    <div className="app-shell">
      <Nav page={page} setPage={p=>{setPage(p);setSession(null);}} data={data} onReset={handleReset}/>
      <div style={{flex:1}}>
        {page==='dashboard'&&<Dashboard data={data} startQuiz={startQuiz} setPage={setPage}/>}
        {page==='quiz'&&quizSubject&&<QuizPage data={data} setData={setData} subjectKey={quizSubject} key={quizKey} goResults={handleResults} goBack={()=>setPage('dashboard')}/>}
        {page==='results'&&session&&<ResultsPage session={session} data={data} startQuiz={startQuiz} goHome={()=>setPage('dashboard')}/>}
        {page==='ask'&&<AskPage data={data} setData={setData}/>}
        {page==='manage'&&<ManagePage data={data} setData={setData}/>}
      </div>
      <ToastContainer/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
