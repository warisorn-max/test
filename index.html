<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Select Role</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f4f5f7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      text-align: center;
      max-width: 480px;
      width: 100%;
    }

    .logo {
      width: 52px;
      height: 52px;
      background: #4f46e5;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
    }

    .logo svg { width: 28px; height: 28px; fill: white; }

    h1 {
      font-size: 22px;
      font-weight: 600;
      color: #111827;
      margin-bottom: 0.5rem;
    }

    p {
      font-size: 15px;
      color: #6b7280;
      margin-bottom: 2.5rem;
    }

    .cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .card {
      background: white;
      border: 1.5px solid #e5e7eb;
      border-radius: 14px;
      padding: 2rem 1.25rem;
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.1s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .card:hover {
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79,70,229,0.08);
      transform: translateY(-2px);
    }

    .icon-wrap {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
    }

    .teacher .icon-wrap { background: #eef2ff; }
    .student .icon-wrap { background: #f0fdf4; }

    .card-title {
      font-size: 16px;
      font-weight: 600;
      color: #111827;
    }

    .card-desc {
      font-size: 13px;
      color: #6b7280;
      line-height: 1.4;
    }

    .badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 99px;
    }

    .teacher .badge { background: #eef2ff; color: #4338ca; }
    .student .badge { background: #f0fdf4; color: #166534; }

    @media (max-width: 400px) {
      .cards { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3zM5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82z"/></svg>
    </div>
    <h1>Welcome back</h1>
    <p>Choose your role to continue</p>

    <div class="cards">
      <a href="login-teacher.html" class="card teacher">
        <div class="icon-wrap">🧑‍🏫</div>
        <div class="card-title">Teacher</div>
        <div class="card-desc">Manage classes, students, and assignments</div>
        <span class="badge">Instructor</span>
      </a>

      <a href="login-student.html" class="card student">
        <div class="icon-wrap">🎓</div>
        <div class="card-title">Student</div>
        <div class="card-desc">View courses, submit work, track progress</div>
        <span class="badge">Learner</span>
      </a>
    </div>
  </div>
</body>
</html>
