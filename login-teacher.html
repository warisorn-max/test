<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teacher Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f4f5f7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: white;
      border-radius: 16px;
      border: 1px solid #e5e7eb;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
    }

    .role-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #eef2ff;
      color: #4338ca;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 99px;
      margin-bottom: 1.25rem;
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      color: #111827;
      margin-bottom: 0.4rem;
    }

    .subtitle {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 2rem;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #374151;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 15px;
      color: #111827;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 1rem;
    }

    input:focus { border-color: #4f46e5; }

    .error {
      background: #fef2f2;
      color: #b91c1c;
      font-size: 13px;
      padding: 10px 12px;
      border-radius: 8px;
      margin-bottom: 1rem;
      display: none;
    }

    button[type="submit"] {
      width: 100%;
      padding: 11px;
      background: #4f46e5;
      color: white;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 0.25rem;
    }

    button[type="submit"]:hover { background: #4338ca; }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 1.25rem;
      font-size: 13px;
      color: #6b7280;
      text-decoration: none;
    }

    .back-link:hover { color: #4f46e5; }

    .hint {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 1.5rem;
      text-align: center;
      background: #f9fafb;
      padding: 8px 12px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="role-badge">🧑‍🏫 Teacher</div>
    <h1>Teacher login</h1>
    <p class="subtitle">Sign in to your instructor account</p>

    <div class="error" id="error">Incorrect email or password. Please try again.</div>

    <label for="email">Email address</label>
    <input type="email" id="email" placeholder="teacher@school.edu" autocomplete="username" />

    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" />

    <button type="submit" onclick="handleLogin()">Sign in</button>

    <p class="hint">Demo: use any email ending in <strong>@teacher.com</strong> with password <strong>teacher123</strong></p>

    <a href="index.html" class="back-link">← Back to role selection</a>
  </div>

  <script>
    function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const error = document.getElementById('error');

      error.style.display = 'none';

      if (!email || !password) {
        error.textContent = 'Please fill in all fields.';
        error.style.display = 'block';
        return;
      }

      if (email.endsWith('@teacher.com') && password === 'teacher123') {
        sessionStorage.setItem('user', JSON.stringify({ name: email.split('@')[0], role: 'teacher' }));
        window.location.href = 'dashboard-teacher.html';
      } else {
        error.textContent = 'Incorrect email or password. Please try again.';
        error.style.display = 'block';
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
</body>
</html>
